---
layout: default
---

<div class="person-page-wrapper">
  {% if page.coverimg %}
  <div class="person-hero">
    <img src="{{ page.coverimg }}" alt="{{ page.title }}" class="person-hero-image">
  </div>  
    {% endif %}
</div>

<div class="person-details">
  <h1>{{ page.title }}</h1>
    {% if page.role %}
    <p class="person-role-header">{{ page.role }}</p>
    {% endif %}
</div>

<div class="person-content-body">
  {{ content }}
</div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=Helvetica+Neue:wght@300&display=swap');

.person-page-wrapper {
  width: 100%;
  clear: both;
}

.person-hero {
  font-family: 'Lexend', sans-serif;
  font-weight: 700;
  width: 100%;
  height: 400px;
  overflow: hidden;
  margin-bottom: 2rem;
  border-radius: 8px;
  clear: both;
}

.person-hero-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.person-details {
  max-width: 800px;
  margin: 0 auto;
  padding: 0 1rem;
  clear: both;
}

.person-details h1 {
  margin-top: 0;
  margin-bottom: 0.5rem;
}

.person-role-header {
  font-size: 1.1rem;
  color: #666;
  font-style: italic;
  margin-bottom: 2rem;
  border-bottom: 2px solid #e0e0e0;
  padding-bottom: 1rem;
}

.person-content-body {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  max-width: 800px;
  font-weight: 400;
  line-height: 1.8;
  color: #333;
  clear: both;
}

.person-content-body p {
  margin-bottom: 1rem;
}
</style>
