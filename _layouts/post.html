---
layout: default
---

<div class="blog-layout">
  <div class="blog-header">
    <h1 class="blog-title">{{ page.title }}</h1>
    
    {% if page.date %}
    <p class="blog-date">{{ page.date | date_to_string }}</p>
    {% endif %}
    
    {% if page.category %}
    <p class="blog-category">{{ page.category }}</p>
    {% endif %}
  </div>

  <div class="blog-content">
    {{ content }}
  </div>
</div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=Helvetica+Neue:wght@300&display=swap');

.blog-layout {
  max-width: 900px;
  margin: 0 auto;
  padding: 2rem 1rem;
}

.blog-header {
  margin-bottom: 3rem;
  border-bottom: 2px solid #e0e0e0;
  padding-bottom: 2rem;
}

.blog-title {
  font-family: 'Lexend', sans-serif;
  font-size: 2.5rem;
  font-weight: 700;
  margin: 0 0 0.5rem 0;
  color: #333;
  text-align: left;
}

@media (max-width: 768px) {
  .blog-title {
    font-size: 1.8rem;
  }
}

.blog-date {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-weight: 300;
  font-size: 1.4rem;
  color: #000000;
  margin: 0 0 0.5rem 0;
  font-style: italic;
}

.blog-category {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-weight: 400;
  font-size: 0.9rem;
  color: #4b9ec6;
  margin: 0;
  font-weight: 600;
}

.blog-content {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-weight: 400;
  line-height: 1.4;
  color: #333;
}

.blog-content h1,
.blog-content h2,
.blog-content h3,
.blog-content h4,
.blog-content h5,
.blog-content h6 {
  font-family: 'Lexend', sans-serif;
  text-align: left;
  color: #2c2c2c;
  margin-top: 2rem;
  margin-bottom: 1rem;
  font-weight: 600;
}

.blog-content h1 {
  font-size: 2rem;
}

.blog-content h2 {
  font-size: 1.75rem;
}

.blog-content h3 {
  font-size: 1.5rem;
}

.blog-content h4 {
  font-size: 1.25rem;
}

.blog-content h5 {
  font-size: 1.1rem;
}

.blog-content h6 {
  font-size: 1rem;
}

.blog-content p {
  text-align: justify;
  margin-bottom: 1.5rem;
  hyphens: none;
  word-break: normal;
  overflow-wrap: normal;
}

.blog-content ul,
.blog-content ol {
  margin-bottom: 1.5rem;
  padding-left: 2rem;
}

.blog-content li {
  margin-bottom: 0.75rem;
  text-align: justify;
}

.blog-content blockquote {
  border-left: 4px solid #4b9ec6;
  padding-left: 1.5rem;
  margin-left: 0;
  margin-bottom: 1.5rem;
  color: #666;
  font-style: italic;
}

.blog-content a {
  color: #4b9ec6;
  text-decoration: none;
}

.blog-content a:hover {
  text-decoration: underline;
}

.blog-content table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 1.5rem;
}

.blog-content table th,
.blog-content table td {
  border: 1px solid #ddd;
  padding: 1rem;
  text-align: left;
}

.blog-content table th {
  background-color: #f5f5f5;
  font-weight: 600;
  font-family: 'Lexend', sans-serif;
}

.blog-content hr {
  border: none;
  border-top: 2px solid #e0e0e0;
  margin: 2rem 0;
}

.blog-content code {
  background-color: #f5f5f5;
  padding: 0.2rem 0.5rem;
  border-radius: 3px;
  font-family: 'Courier New', monospace;
  font-size: 0.9rem;
}

.blog-content pre {
  background-color: #f5f5f5;
  padding: 1rem;
  border-radius: 5px;
  overflow-x: auto;
  margin-bottom: 1.5rem;
}

.blog-content pre code {
  background-color: transparent;
  padding: 0;
}
</style>
