---
---

<div class="default-layout">
  <div class="default-header">
    <h1 class="default-title">{{ default.title }}</h1>
    {% if default.subtitle %}
    <p class="default-subtitle">{{ default.subtitle }}</p>
    {% endif %}
  </div>

  <div class="default-content">
    {{ content }}
  </div>
</div>

<style>
.default-layout {
  max-width: 1000px;
  margin: 0 auto;
  padding: 2rem 1rem;
}

@media (min-width: 640px) {
  .default-layout {
    padding: 3rem 1.5rem;
  }
}

@media (min-width: 1024px) {
  .default-layout {
    padding: 4rem 2rem;
  }
}

.default-header {
  margin-bottom: 3rem;
  text-align: center;
  border-bottom: 2px solid #e0e0e0;
  padding-bottom: 2rem;
}

.default-title {
  font-size: 2rem;
  font-weight: 700;
  margin: 0 0 0.5rem 0;
  color: rgb(40, 73, 77);
}

@media (min-width: 640px) {
  .default-title {
    font-size: 2.5rem;
  }
}

@media (min-width: 1024px) {
  .default-title {
    font-size: 2.75rem;
  }
}

.default-subtitle {
  font-size: 1.1rem;
  color: #666;
  font-style: italic;
  margin: 0;
  font-weight: 300;
}

.default-content {
  line-height: 1.8;
  color: #333;
}

.default-content p {
  margin-bottom: 1.5rem;
}

.default-content h1,
.default-content h2,
.default-content h3,
.default-content h4,
.default-content h5,
.default-content h6 {
  color: rgb(40, 73, 77);
  margin-top: 2rem;
  margin-bottom: 1rem;
  font-weight: 600;
}

.default-content h1 {
  font-size: 2rem;
}

.default-content h2 {
  font-size: 1.75rem;
}

.default-content h3 {
  font-size: 1.5rem;
}

.default-content h4 {
  font-size: 1.25rem;
}

.default-content h5 {
  font-size: 1.1rem;
}

.default-content h6 {
  font-size: 1rem;
}

.default-content ul,
.default-content ol {
  margin-bottom: 1.5rem;
  padding-left: 2rem;
}

.default-content li {
  margin-bottom: 0.75rem;
}

.default-content blockquote {
  border-left: 4px solid #4b9ec6;
  padding-left: 1.5rem;
  margin-left: 0;
  margin-bottom: 1.5rem;
  color: #666;
  font-style: italic;
}

.default-content a {
  color: #4b9ec6;
  text-decoration: none;
}

.default-content a:hover {
  text-decoration: underline;
}

.default-content img {
  max-width: 100%;
  height: auto;
  margin: 2rem 0;
  border-radius: 8px;
}

.default-content table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 1.5rem;
}

.default-content table th,
.default-content table td {
  border: 1px solid #ddd;
  padding: 1rem;
  text-align: left;
}

.default-content table th {
  background-color: #f5f5f5;
  font-weight: 600;
  color: rgb(40, 73, 77);
}

.default-content code {
  background-color: #f5f5f5;
  padding: 0.2rem 0.5rem;
  border-radius: 3px;
  font-family: 'Courier New', monospace;
  font-size: 0.9rem;
  color: #d73a49;
}

.default-content pre {
  background-color: #f5f5f5;
  padding: 1rem;
  border-radius: 5px;
  overflow-x: auto;
  margin-bottom: 1.5rem;
}

.default-content pre code {
  background-color: transparent;
  padding: 0;
  color: #333;
}

.default-content hr {
  border: none;
  border-top: 2px solid #e0e0e0;
  margin: 2rem 0;
}
</style>
